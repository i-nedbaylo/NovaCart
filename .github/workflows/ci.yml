name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NovaCart.slnx

      - name: Build
        run: dotnet build NovaCart.slnx --configuration Release --no-restore

      # Runs unit and architecture tests. Integration tests (Testcontainers) require a
      # Docker daemon; the GitHub-hosted ubuntu runners provide one when those tests are added.
      - name: Test
        run: >-
          dotnet test NovaCart.slnx
          --configuration Release
          --no-build
          --verbosity normal
