name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit/Architecture Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NovaCart.slnx

      - name: Build
        run: dotnet build NovaCart.slnx --configuration Release --no-restore

      # Runs everything except Testcontainers integration tests ([Trait("Category","Integration")],
      # run in the job below) and the full-stack E2E ([Trait("Category","E2E")], too heavy/flaky for
      # shared runners — run it locally). Filtering by trait, not by name, so unit tests for the
      # *IntegrationEvent* consumers are not excluded by accident.
      - name: Unit & architecture tests
        run: >-
          dotnet test NovaCart.slnx
          --configuration Release
          --no-build
          --filter "Category!=Integration&Category!=E2E"

  integration-tests:
    name: Integration Tests (Testcontainers PostgreSQL)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore NovaCart.slnx

      - name: Build
        run: dotnet build NovaCart.slnx --configuration Release --no-restore

      # ubuntu-latest ships a running Docker engine; Testcontainers uses it to start
      # PostgreSQL automatically. Tests self-skip if Docker is ever unavailable.
      - name: Integration tests
        run: >-
          dotnet test NovaCart.slnx
          --configuration Release
          --no-build
          --filter "Category=Integration"
